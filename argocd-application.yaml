apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flask-todo
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: "flask-todo=abdulahad9049/flask-todo-app"
    argocd-image-updater.argoproj.io/flask-todo.update-strategy: "latest"
    argocd-image-updater.argoproj.io/flask-todo.allow-tags: "regexp:^v[0-9]+$"
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    repoURL: https://github.com/Ahad9049/argocd-helm-imageupdater.git
    path: flask-todo-helm
    targetRevision: main
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true